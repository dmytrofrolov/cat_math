<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Jig</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        height: 100%;
        overflow: hidden;
        background: #0a0a0c;
      }
      body {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: auto;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        background: #0a0a0c;
        font-family: -apple-system, Helvetica, Arial, sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        display: block;
      }
      #zone {
        position: fixed;
        top: 0;
        left: 0;
        width: 0;
        height: 72px;
        pointer-events: none;
        border-bottom: 2px solid transparent;
        -webkit-transition: border-color 0.15s, background 0.15s;
        transition: border-color 0.15s, background 0.15s;
        z-index: 2;
      }
      #zone.active {
        border-bottom-color: rgba(255, 220, 120, 0.55);
        background: -webkit-linear-gradient(
          top,
          rgba(255, 200, 80, 0.14) 0%,
          transparent 100%
        );
        background: linear-gradient(
          to bottom,
          rgba(255, 200, 80, 0.14) 0%,
          transparent 100%
        );
      }
      #hint {
        position: fixed;
        left: 50%;
        bottom: 0.75rem;
        width: 92%;
        max-width: 28rem;
        padding: 0 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.8rem;
        line-height: 1.35;
        letter-spacing: 0.02em;
        text-align: center;
        pointer-events: none;
        z-index: 2;
        -webkit-transform: translateX(-50%);
        transform: translateX(-50%);
      }
      body.jigging {
        cursor: none;
      }
    </style>
  </head>
  <body>
    <div id="zone" aria-hidden="true"></div>
    <canvas id="c" aria-hidden="true"></canvas>
    <p id="hint">Move into the top band to activate the jig.</p>

    <script>
      (function () {
        "use strict";

        var canvas = document.getElementById("c");
        var ctx = canvas.getContext("2d");
        var zoneEl = document.getElementById("zone");
        var hint = document.getElementById("hint");

        var ua = navigator.userAgent || "";
        var isIOS9 = /(iPhone|iPad|iPod).*OS 9_/i.test(ua);
        var isCoarse = false;
        try {
          isCoarse = window.matchMedia("(pointer: coarse)").matches;
        } catch (e1) {
          isCoarse = "ontouchstart" in window;
        }
        var lite = false;
        var DPR = 1;

        var w = 0;
        var h = 0;
        var viewLeft = 0;
        var viewTop = 0;
        var topZone = 72;
        var STEP_MS = 1000 / 60;
        var t = 0;
        var lastFrame = 0;
        var accum = 0;

        var mx = -1;
        var my = -1;
        var smMx = -1;
        var smMy = -1;
        var prevMx = -1;
        var prevMy = -1;
        var jigActive = false;
        var zoneLatched = false;
        var touching = false;

        var offX = 0;
        var offY = 0;
        var offVX = 0;
        var offVY = 0;
        var pullX = 0;
        var pullY = 0;
        var smoothDx = 0;
        var smoothDy = 0;

        var layoutW = 0;
        var layoutH = 0;
        var resizeRaf = 0;

        var stripePattern = null;

        var raf =
          window.requestAnimationFrame ||
          window.webkitRequestAnimationFrame ||
          function (cb) {
            return window.setTimeout(function () {
              cb(Date.now());
            }, 16);
          };

        var now =
          window.performance && window.performance.now
            ? function () {
                return window.performance.now();
              }
            : function () {
                return Date.now();
              };

        var supportsPassive = false;
        try {
          var passiveOpts = Object.defineProperty({}, "passive", {
            get: function () {
              supportsPassive = true;
            },
          });
          window.addEventListener("testPassive", null, passiveOpts);
          window.removeEventListener("testPassive", null, passiveOpts);
        } catch (e2) {
          supportsPassive = false;
        }

        lite = isIOS9 || (!supportsPassive && "ontouchstart" in window);
        DPR = lite ? 1 : Math.min(window.devicePixelRatio || 1, 2);

        function addListener(target, type, handler, passive) {
          if (supportsPassive && passive !== undefined) {
            target.addEventListener(type, handler, { passive: passive });
          } else {
            target.addEventListener(type, handler, false);
          }
        }

        function setClass(el, className, on) {
          if (on) {
            el.classList.add(className);
          } else {
            el.classList.remove(className);
          }
        }

        function layoutMetrics() {
          var vv = window.visualViewport;
          if (vv) {
            return {
              w: vv.width,
              h: vv.height,
              left: vv.offsetLeft,
              top: vv.offsetTop,
            };
          }
          return {
            w: window.innerWidth,
            h: window.innerHeight,
            left: 0,
            top: 0,
          };
        }

        function applyViewportLayout(m) {
          w = m.w;
          h = m.h;
          viewLeft = m.left;
          viewTop = m.top;

          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          canvas.style.webkitTransform =
            "translate(" + viewLeft + "px," + viewTop + "px)";
          canvas.style.transform =
            "translate(" + viewLeft + "px," + viewTop + "px)";
          zoneEl.style.width = w + "px";
          zoneEl.style.webkitTransform =
            "translate(" + viewLeft + "px," + viewTop + "px)";
          zoneEl.style.transform =
            "translate(" + viewLeft + "px," + viewTop + "px)";
        }

        function updateTopZone() {
          topZone = Math.round(Math.min(96, Math.max(52, h * 0.12)));
          zoneEl.style.height = topZone + "px";
        }

        function resize() {
          var m = layoutMetrics();
          var bw = Math.floor(m.w * DPR);
          var bh = Math.floor(m.h * DPR);
          if (
            Math.abs(m.w - layoutW) < 0.5 &&
            Math.abs(m.h - layoutH) < 0.5 &&
            bw === canvas.width &&
            bh === canvas.height
          ) {
            return;
          }
          layoutW = m.w;
          layoutH = m.h;
          applyViewportLayout(m);
          updateTopZone();

          canvas.width = bw;
          canvas.height = bh;
          if (ctx.setTransform) {
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
          } else {
            ctx.scale(DPR, DPR);
          }
          if (!lite) {
            initStripePattern();
          }

          if (mx >= 0) {
            setJigging(inTopZone(my));
          }
        }

        function scheduleResize() {
          if (resizeRaf) {
            return;
          }
          resizeRaf = raf(function () {
            resizeRaf = 0;
            resize();
          });
        }

        function inTopZone(y) {
          if (!zoneLatched && y <= topZone) {
            zoneLatched = true;
          } else if (zoneLatched && y > topZone + 18) {
            zoneLatched = false;
          }
          return zoneLatched;
        }

        function pointerFromEvent(e) {
          var clientX;
          var clientY;
          if (e.touches && e.touches.length) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
          } else if (e.changedTouches && e.changedTouches.length) {
            clientX = e.changedTouches[0].clientX;
            clientY = e.changedTouches[0].clientY;
          } else {
            clientX = e.clientX;
            clientY = e.clientY;
          }
          var x = Math.max(0, Math.min(w, clientX - viewLeft));
          var y = Math.max(0, Math.min(h, clientY - viewTop));
          return { x: x, y: y };
        }

        function applyMovement(dx, dy) {
          var blend = 0.18;
          smoothDx = smoothDx * (1 - blend) + dx * blend;
          smoothDy = smoothDy * (1 - blend) + dy * blend;
          var cap = Math.min(w, h) * 0.08;
          smoothDx = Math.max(-cap, Math.min(cap, smoothDx));
          smoothDy = Math.max(-cap, Math.min(cap, smoothDy));
          if (jigActive) {
            pullX += smoothDx * 0.18;
            pullY += smoothDy * 0.18;
          }
        }

        function setPointer(x, y, dx, dy) {
          prevMx = mx;
          prevMy = my;
          mx = x;
          my = y;
          if (lite) {
            smMx = x;
            smMy = y;
          }
          setJigging(inTopZone(my));
          if (dx !== undefined) {
            applyMovement(dx, dy);
          }
        }

        function clearPointer() {
          mx = -1;
          my = -1;
          smMx = -1;
          smMy = -1;
          prevMx = -1;
          prevMy = -1;
          touching = false;
          zoneLatched = false;
          smoothDx = 0;
          smoothDy = 0;
          setJigging(false);
        }

        function setJigging(on) {
          if (jigActive === on) {
            return;
          }
          jigActive = on;
          setClass(document.body, "jigging", on && !isCoarse);
          setClass(zoneEl, "active", on);
          if (on) {
            hint.textContent = isCoarse
              ? "Jig active - drag in the top band. Lift your finger to stop."
              : "Jig active - your hand may drift. Leave the top band to stop.";
          } else {
            hint.textContent = isCoarse
              ? "Touch and drag in the top band to activate the jig."
              : "Move into the top band to activate the jig.";
          }
        }

        function onPointerMove(e) {
          var p = pointerFromEvent(e);
          var dx = 0;
          var dy = 0;
          if (prevMx >= 0) {
            dx = p.x - prevMx;
            dy = p.y - prevMy;
          } else if (e.movementX !== undefined) {
            dx = e.movementX;
            dy = e.movementY;
          }
          setPointer(p.x, p.y, dx, dy);
        }

        function initStripePattern() {
          var stripeTile = document.createElement("canvas");
          stripeTile.width = 16;
          stripeTile.height = 16;
          var stripeCtx = stripeTile.getContext("2d");
          stripeCtx.fillStyle = "#121212";
          stripeCtx.fillRect(0, 0, 16, 16);
          stripeCtx.fillStyle = "#fafafa";
          stripeCtx.fillRect(0, 0, 8, 16);
          stripePattern = ctx.createPattern(stripeTile, "repeat");
        }

        function drawGrating(cx, cy, angle, phase, alpha) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          ctx.translate(phase * 8, 0);
          ctx.globalAlpha = alpha;
          if (stripePattern) {
            ctx.fillStyle = stripePattern;
            var span = Math.max(w, h) * 1.8;
            ctx.fillRect(-span, -span, span * 2, span * 2);
          }
          ctx.restore();
        }

        function drawGratingFallback(cx, cy, angle, phase, alpha, fg, bg, stripe) {
          var band = stripe || 12;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          var span = Math.max(w, h) * 1.4;
          var i;
          var steps = Math.ceil(span / band) + 1;
          ctx.globalAlpha = alpha;
          for (i = -steps; i <= steps; i++) {
            var y0 = i * band + phase * band;
            ctx.fillStyle = i % 2 === 0 ? fg : bg;
            ctx.fillRect(-span, y0, span * 2, band * 0.5);
          }
          ctx.restore();
        }

        function drawPinwheelLite(cx, cy, r, spin) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(spin);
          ctx.fillStyle = "#f2f2f2";
          ctx.fillRect(-r, -3, r * 2, 6);
          ctx.fillRect(-3, -r, 6, r * 2);
          ctx.restore();
        }

        function drawPinwheel(cx, cy, r, spin, teeth) {
          var i;
          var a0;
          var a1;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(spin);
          for (i = 0; i < teeth; i++) {
            a0 = (i / teeth) * Math.PI * 2;
            a1 = a0 + (Math.PI * 2) / teeth / 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, r, a0, a1);
            ctx.closePath();
            ctx.fillStyle = i % 2 ? "#f5f5f5" : "#101010";
            ctx.fill();
          }
          ctx.restore();
        }

        function drawWaves() {
          var cx = w * 0.5;
          var cy = h * 0.52;
          var rings = w < 480 ? 10 : 14;
          var step = w < 480 ? 22 : 28;
          var breathe = Math.sin(t * 0.85) * 2.5;
          var i;
          var rr;
          for (i = 0; i < rings; i++) {
            rr = 32 + i * step + breathe;
            ctx.beginPath();
            ctx.arc(cx, cy, rr, 0, Math.PI * 2);
            ctx.strokeStyle =
              i % 2 === 0 ? "rgba(255,255,255,0.45)" : "rgba(0,0,0,0.45)";
            ctx.lineWidth = 2 + (i % 3) * 0.5;
            ctx.stroke();
          }
        }

        function drawPatternLite() {
          var cx = w * 0.5;
          var cy = h * 0.5;
          var scale = Math.min(w, h);
          var i;
          var rr;
          var step = scale * 0.14;

          ctx.fillStyle = "#0e0e12";
          ctx.fillRect(0, 0, w, h);

          drawGratingFallback(
            cx,
            cy,
            t * 0.25,
            t * 0.5,
            0.5,
            "#f0f0f0",
            "#141414",
            16
          );
          drawPinwheelLite(cx, cy, scale * 0.2, -t * 0.4);

          ctx.globalAlpha = 0.4;
          for (i = 0; i < 5; i++) {
            rr = 40 + i * step;
            ctx.beginPath();
            ctx.arc(cx, cy, rr, 0, Math.PI * 2);
            ctx.strokeStyle = i % 2 === 0 ? "#ffffff" : "#000000";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

        function drawPattern() {
          if (lite) {
            drawPatternLite();
            return;
          }

          var cx = w * 0.5;
          var cy = h * 0.5;
          var scale = Math.min(w, h);
          var layers = [
            { a: t * 0.28, ph: t * 0.55, al: 0.38 },
            { a: -t * 0.22 + 0.6, ph: -t * 0.48, al: 0.34 },
            { a: t * 0.16 + 1.1, ph: t * 0.62, al: 0.3 },
          ];
          var i;
          var veil;

          ctx.fillStyle = "#0e0e12";
          ctx.fillRect(0, 0, w, h);

          ctx.globalCompositeOperation = "source-over";
          for (i = 0; i < layers.length; i++) {
            if (stripePattern) {
              drawGrating(cx, cy, layers[i].a, layers[i].ph, layers[i].al);
            } else {
              drawGratingFallback(
                cx,
                cy,
                layers[i].a,
                layers[i].ph,
                layers[i].al,
                "#fafafa",
                "#121212",
                12
              );
            }
          }
          ctx.globalAlpha = 1;

          drawPinwheel(cx, cy, scale * 0.22, -t * 0.42, w < 400 ? 18 : 24);
          drawPinwheel(cx, cy, scale * 0.12, t * 0.58, w < 400 ? 12 : 16);

          ctx.globalCompositeOperation = "overlay";
          ctx.globalAlpha = 0.85;
          drawWaves();
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = "source-over";

          veil = ctx.createRadialGradient(cx, cy, 0, cx, cy, scale * 0.75);
          veil.addColorStop(0, "rgba(255,255,255,0.03)");
          veil.addColorStop(0.5, "rgba(0,0,0,0)");
          veil.addColorStop(1, "rgba(0,0,0,0.05)");
          ctx.fillStyle = veil;
          ctx.fillRect(0, 0, w, h);
        }

        function smoothPointer(dt) {
          var k;
          if (mx < 0) {
            return;
          }
          k = 1 - Math.exp(-dt * 0.014);
          if (smMx < 0) {
            smMx = mx;
            smMy = my;
            return;
          }
          smMx += (mx - smMx) * k;
          smMy += (my - smMy) * k;
        }

        function updateJigOffset(dt) {
          var damp = Math.pow(0.9, dt / STEP_MS);
          var ampBase;
          var amp;
          var tx;
          var ty;
          var targetX;
          var targetY;
          var blend;

          if (!jigActive) {
            offX *= damp;
            offY *= damp;
            pullX *= damp;
            pullY *= damp;
            offVX = 0;
            offVY = 0;
            return;
          }

          ampBase = Math.min(w, h) * 0.055;
          amp = ampBase * (0.88 + 0.12 * Math.sin(t * 0.9));
          tx = Math.sin(t * 0.95) * amp + Math.cos(t * 0.41) * amp * 0.35;
          ty = Math.cos(t * 0.82) * amp + Math.sin(t * 0.47) * amp * 0.35;

          targetX = tx + pullX * 0.45;
          targetY = ty + pullY * 0.45;

          if (lite) {
            blend = 1 - Math.exp(-dt * 0.008);
            offX += (targetX - offX) * blend;
            offY += (targetY - offY) * blend;
            pullX *= damp;
            pullY *= damp;
            return;
          }

          var stiffness = 0.000038;
          var friction = Math.pow(0.82, dt / STEP_MS);

          offVX += (targetX - offX) * stiffness * dt;
          offVY += (targetY - offY) * stiffness * dt;
          offVX *= friction;
          offVY *= friction;
          offX += offVX * dt;
          offY += offVY * dt;

          pullX *= Math.pow(0.992, dt / STEP_MS);
          pullY *= Math.pow(0.992, dt / STEP_MS);
        }

        function drawPointer() {
          var px;
          var py;
          var vx;
          var vy;
          var r;
          var arm;

          if (mx < 0 || !jigActive) {
            return;
          }

          px = lite ? mx : smMx;
          py = lite ? my : smMy;
          if (px < 0) {
            return;
          }

          vx = px + offX;
          vy = py + offY;
          r = Math.max(8, Math.min(w, h) * 0.018);
          arm = r * 1.6;

          ctx.strokeStyle = "rgba(255, 220, 120, 0.95)";
          ctx.lineWidth = Math.max(2, r * 0.22);
          ctx.beginPath();
          ctx.moveTo(vx - arm, vy);
          ctx.lineTo(vx + arm, vy);
          ctx.moveTo(vx, vy - arm);
          ctx.lineTo(vx, vy + arm);
          ctx.stroke();

          if (!lite && (touching || isCoarse)) {
            ctx.beginPath();
            ctx.arc(px, py, r * 0.7, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
            ctx.lineWidth = Math.max(1.5, r * 0.15);
            ctx.stroke();
          }
        }

        function frame(ts) {
          var frameDt = ts - lastFrame;
          lastFrame = ts;
          if (frameDt > 80) {
            frameDt = STEP_MS;
          }

          if (lite) {
            updateJigOffset(frameDt);
            t += frameDt * 0.001;
          } else {
            accum += frameDt;
            if (accum > STEP_MS * 2) {
              accum = STEP_MS;
            }
            if (accum >= STEP_MS) {
              smoothPointer(STEP_MS);
              updateJigOffset(STEP_MS);
              t += STEP_MS * 0.001;
              accum -= STEP_MS;
            }
          }

          drawPattern();
          drawPointer();
          raf(frame);
        }

        function onTouchMove(e) {
          e.preventDefault();
          onPointerMove(e);
        }

        function onDocTouchMove(e) {
          e.preventDefault();
        }

        window.addEventListener("resize", scheduleResize, false);
        window.addEventListener(
          "orientationchange",
          function () {
            window.setTimeout(scheduleResize, 120);
          },
          false
        );
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", scheduleResize, false);
          window.visualViewport.addEventListener("scroll", scheduleResize, false);
        }

        addListener(window, "mousemove", onPointerMove, true);
        addListener(window, "mouseleave", clearPointer, true);

        addListener(
          canvas,
          "touchstart",
          function (e) {
            touching = true;
            onPointerMove(e);
          },
          false
        );
        addListener(canvas, "touchmove", onTouchMove, false);
        addListener(
          canvas,
          "touchend",
          function (e) {
            if (e.touches.length) {
              onPointerMove(e);
              return;
            }
            clearPointer();
          },
          true
        );
        addListener(canvas, "touchcancel", clearPointer, true);

        addListener(document, "touchmove", onDocTouchMove, false);

        if (!lite) {
          initStripePattern();
        }
        resize();
        lastFrame = now();
        raf(frame);
      })();
    </script>
  </body>
</html>
