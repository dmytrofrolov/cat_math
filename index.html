<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Practice — Addition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem;
        background: #f8f9fa;
      }
      h1 {
        margin-top: 0;
        color: #1a1a2e;
      }
      .controls {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      label {
        font-weight: 500;
      }
      select {
        padding: 0.5rem 2rem 0.5rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
      }
      button {
        padding: 0.5rem 1.25rem;
        font-size: 1rem;
        font-weight: 500;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      .hero {
        width: 100%;
        aspect-ratio: 4 / 3;
        margin-bottom: 1.25rem;
        border-radius: 8px;
        overflow: hidden;
        background: #e5e7eb;
      }
      .hero img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .cell {
        padding: 0.35rem 0.4rem;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        min-width: 0;
      }
      .problem {
        font-family:
          ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
        font-size: 0.8rem;
        text-align: right;
        line-height: 1.35;
        white-space: pre;
      }
      .problem.op {
        color: #6b7280;
      }

      @media print {
        @page {
          size: A4;
          margin: 12mm;
        }
        body {
          max-width: none;
          padding: 0;
          background: #fff;
        }
        .controls,
        h1,
        p {
          display: none !important;
        }
        .hero {
          height: 280px;
          aspect-ratio: 4 / 3;
          margin-bottom: 4mm;
          border-radius: 0;
          break-after: avoid;
        }
        .hero img {
          object-fit: contain;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(7, 1.2fr);
          gap: 3mm;
          margin: 0;
        }
        .cell {
          padding: 5mm;
          border: 1px solid #777;
          border-radius: 10px;
          break-inside: avoid;
        }
        .problem {
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="hero">
        <img :src="heroCatUrl" alt="" />
      </div>
      <h1>Math Practice</h1>
      <p>Simple problems for 3rd–5th graders.</p>
      <div class="controls">
        <label for="type">Problem type</label>
        <select id="type" v-model="problemType">
          <option value="addition">Addition</option>
          <option value="subtraction">Subtraction</option>
        </select>
        <label for="complexity">Complexity</label>
        <select id="complexity" v-model="complexity">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button @click="regenerateMath">New problems</button>
        <button @click="regenerateImage">New cat</button>
      </div>
      <div class="grid" v-if="problems.length">
        <div class="cell" v-for="(p, i) in problems" :key="i">
          <div class="problem">{{ p.top }}</div>
          <div class="problem op">{{ p.op }} {{ p.bottom }}</div>
          <div class="problem">{{ p.line }}</div>
          <div class="problem answer">&nbsp;</div>
        </div>
      </div>
      <p v-else class="hint">Click New problems to create a grid of problems.</p>
    </div>

    <script>
      const { createApp, ref, computed, onMounted } = Vue;

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function makeAddition(complexity) {
        let a, b;
        if (complexity === "easy") {
          // 2-digit, sum < 100: a in 10..89, b in 10..(99-a)
          a = randomInt(10, 89);
          b = randomInt(10, 99 - a);
        } else if (complexity === "medium") {
          // 2-digit, sum >= 100: a in 10..90, b in (100-a)..99
          a = randomInt(10, 90);
          b = randomInt(100 - a, 99);
        } else {
          // hard: 3–4 digit numbers (100–999 or 1000–9999)
          const pick = () =>
            Math.random() < 0.5 ? randomInt(100, 999) : randomInt(1000, 9999);
          a = pick();
          b = pick();
        }
        const w = Math.max(String(a).length, String(b).length);
        const pad = (n) => String(n).padStart(w, " ");
        const top = pad(a);
        const bottom = pad(b);
        const line = "-".repeat(w + 2);
        return {
          top,
          op: "+",
          bottom,
          line,
        };
      }

      function makeSubtraction(complexity) {
        let top, bottom;
        if (complexity === "easy") {
          // 2-digit, top > bottom: top in 11..99, bottom in 10..(top-1)
          top = randomInt(11, 99);
          bottom = randomInt(10, top - 1);
        } else if (complexity === "medium") {
          // 2-digit, top > bottom
          top = randomInt(11, 99);
          bottom = randomInt(10, top - 1);
        } else {
          // hard: 3–4 digit, top >= bottom (both 3–4 digit)
          const pick = () =>
            Math.random() < 0.5 ? randomInt(100, 999) : randomInt(1000, 9999);
          top = pick();
          bottom = randomInt(100, top);
        }
        const w = Math.max(String(top).length, String(bottom).length);
        const pad = (n) => String(n).padStart(w, " ");
        const line = "-".repeat(w + 2);
        return {
          top: pad(top),
          op: "−",
          bottom: pad(bottom),
          line,
        };
      }

      createApp({
        setup() {
          const problemType = ref("addition");
          const complexity = ref("easy");
          const problems = ref([]);
          const heroCatUrl = ref("https://cataas.com/cat?width=960");

          const cellCount = 42;

          function regenerateMath() {
            const list = [];
            for (let i = 0; i < cellCount; i++) {
              if (problemType.value === "addition") {
                list.push(makeAddition(complexity.value));
              } else if (problemType.value === "subtraction") {
                list.push(makeSubtraction(complexity.value));
              }
            }
            problems.value = list;
          }

          function regenerateImage() {
            heroCatUrl.value =
              "https://cataas.com/cat?width=960&t=" + Date.now();
          }

          onMounted(() => {
            regenerateMath();
            regenerateImage();
          });

          return {
            problemType,
            complexity,
            problems,
            regenerateMath,
            regenerateImage,
            heroCatUrl,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
